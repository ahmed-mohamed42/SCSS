            .top-link {

            }

            input[type="submit"],

                width: calc(100% - 40px);
                margin: 0 20px;

            .link {
                text-align: center;
                margin-top: 10px;
                font-size: 14px;
                color: #00c6ff;
                cursor: pointer;
            }

            .hidden {
                display: none;
            }

            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                justify-content: center;
                align-items: center;
            }

            .modal-content {
                background: #1b263b;
                padding: 20px;
                border-radius: 15px;
                width: 300px;
                color: white;
            }

            .close {
                float: right;
                cursor: pointer;
                color: red;
            }
        </style>

            <!-- LOGIN -->

            <!-- SIGN UP -->
            <div id="signupBox" class="hidden">
                <div class="top-link" onclick="showLogin()">LOGIN</div>
                <h1>Create Account</h1>
                <div class="subtitle">Create your new account</div>

               <!--  Create Account -->
                <form id="signupForm" action="login.php" method="post" enctype="multipart/form-data">

                    <input type="text" id="fullName" name="Full_Name" placeholder="Full Name" required>
                    <input type="email" id="email"  name="Email" placeholder="Email" required>
                    <input type="password" id="password"  name="Password" placeholder="Password" required>
                    <input type="password" id="confirmPassword"  name="Confirm_Password" placeholder="Confirm Password" required>
                    <input type="tel" id="phone"  name="Phone" placeholder="Phone Number" required>
                    <input type="date" id="dob" name="dob" lang="en" required>
                    <textarea id="address" name="Address" placeholder="Address" required></textarea>
                    
                    <input type="text" id="plate" name="Car_Plate" placeholder="Car Plate Number" required>

                    <!-- Car Brand -->
                    <select id="carType" name="car_type" onchange="updateModels()">
                        <option value="">Select Car Brand</option>
                        <option value="bmw">BMW</option>
                        <option value="toyota">Toyota</option>
                        <option value="mercedes">Mercedes</option>
                    </select>

                    <div class="link" onclick="showCustomBrand()">The Car is not there?</div>

                    <input type="text" id="customBrand" name="custom_brand" placeholder="Enter Car Brand" class="hidden"
                        oninput="autoDetectModels()">

                    <!-- Car Model -->
                    <select id="carModel" name="car_model">
                        <option value="">Select Model</option>
                    </select>
                    
                    <input type="text" id="customModel" name="custom_model" placeholder="Or Enter Model Manually" class="hidden">

                   
                    <input type="file" id="profilePic" name="img" accept="image/*" required>

                    <input type="submit" value="Create Account">
                </form>
            </div>

        </div>

        <!-- Forgot Password -->
        <div class="modal" id="forgotModal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">✖</span>
                <h3>Reset Password</h3>
                <input type="text" id="resetInput" placeholder="Enter your Email or Mobile">
                <button onclick="resetPassword()">Reset</button>
            </div>
        </div>

        <script>

            function showSignup() {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("signupBox").classList.remove("hidden");
            }

            function showLogin() {
                document.getElementById("signupBox").classList.add("hidden");
                document.getElementById("loginBox").classList.remove("hidden");
            }
        //موديلات جاهزه
    let models = {
        bmw: ["X1", "X3", "X5", "M3", "M5"],
        toyota: ["Corolla", "Camry", "Yaris", "Fortuner"],
        mercedes: ["C180", "E200", "S500", "G63"],
        kia: ["Cerato", "Sportage", "Rio"],
        hyundai: ["Elantra", "Tucson", "Accent"]
    };

    function updateModels() {
        let carType = document.getElementById("carType").value;
        let carModel = document.getElementById("carModel");

        carModel.innerHTML = '<option value="">Select Model</option>';

        if (models[carType]) {
            models[carType].forEach(function (model) {
                let option = document.createElement("option");
                option.value = model;
                option.textContent = model;
                carModel.appendChild(option);
            });
        }
    }

    function showCustomBrand() {
        document.getElementById("customBrand").classList.remove("hidden");
        document.getElementById("customModel").classList.remove("hidden");
    }

    function autoDetectModels() {
        let brand = document.getElementById("customBrand").value.toLowerCase();
        let carModel = document.getElementById("carModel");

        carModel.innerHTML = '<option value="">Select Model</option>';

        if (models[brand]) {
            models[brand].forEach(function (model) {
                let option = document.createElement("option");
                option.value = model;
                option.textContent = model;
                carModel.appendChild(option);
            });
        }
    }

    function openModal() {
        document.getElementById("forgotModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("forgotModal").style.display = "none";
    }

    function resetPassword() {
        let input = document.getElementById("resetInput").value;
        window.history.pushState({}, "", window.location.pathname + "?reset=" + encodeURIComponent(input));
        closeModal();
    }

</script>
